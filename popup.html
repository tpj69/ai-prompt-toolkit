<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt Toolkit</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect width="20" height="20" rx="4" fill="#FF6B35"/>
            <path d="M5 7h10M5 10h7M5 13h10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="logo-text">Prompt Toolkit</span>
        </div>
        <div class="header-actions">
          <button id="btn-add-custom" class="btn-icon" title="Add custom prompt">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <button id="btn-toggle-favs" class="btn-icon" title="Show favorites">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 2l1.8 3.6L14 6.2l-3 2.9.7 4.1L8 11.4l-3.7 1.8.7-4.1-3-2.9 4.2-.6L8 2z" stroke="currentColor" stroke-width="1.2" fill="none"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search prompts..." autocomplete="off">
        <kbd class="search-kbd">/</kbd>
      </div>
    </header>

    <!-- Category Tabs -->
    <nav class="tabs" id="category-tabs">
      <button class="tab active" data-cat="all">All</button>
      <button class="tab" data-cat="thinking_frameworks">Thinking</button>
      <button class="tab" data-cat="critique_analysis">Critique</button>
      <button class="tab" data-cat="research_learning">Research</button>
      <button class="tab" data-cat="strategy_planning">Strategy</button>
      <button class="tab" data-cat="claude_optimized">Claude</button>
      <button class="tab" data-cat="advanced_patterns">Advanced</button>
    </nav>

    <!-- Platform Indicator -->
    <div class="platform-bar" id="platform-bar">
      <span class="platform-dot"></span>
      <span id="platform-name">No AI platform detected</span>
    </div>

    <!-- Prompt List -->
    <div class="prompt-list" id="prompt-list">
      <!-- Populated by JS -->
    </div>

    <!-- Empty State -->
    <div class="empty-state hidden" id="empty-state">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
        <path d="M14 16h12M14 20h8M14 24h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      </svg>
      <p>No prompts found</p>
    </div>

    <!-- Add Custom Prompt Modal -->
    <div class="modal-overlay hidden" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3>Add Custom Prompt</h3>
          <button id="modal-close" class="btn-icon">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <label>Name</label>
          <input type="text" id="custom-name" placeholder="My custom prompt">
          <label>Category</label>
          <select id="custom-category">
            <option value="thinking_frameworks">Thinking Frameworks</option>
            <option value="critique_analysis">Critique & Analysis</option>
            <option value="research_learning">Research & Learning</option>
            <option value="strategy_planning">Strategy & Planning</option>
            <option value="claude_optimized">Claude Optimized</option>
            <option value="advanced_patterns">Advanced Patterns</option>
          </select>
          <label>Prompt</label>
          <textarea id="custom-prompt" rows="5" placeholder="Write your prompt..."></textarea>
        </div>
        <div class="modal-footer">
          <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button id="modal-save" class="btn btn-primary">Save Prompt</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast hidden" id="toast">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/>
        <path d="M4.5 7l2 2 3.5-3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="toast-msg">Prompt copied!</span>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
